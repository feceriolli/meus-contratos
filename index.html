<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contratos Jurídicos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0a0c;--surf:#111115;--surf2:#18181f;--surf3:#1e1e28;
  --brd:#2a2a38;--brds:#1e1e2a;
  --acc:#7c6af5;--acc2:#a89cf7;--glow:rgba(124,106,245,.18);
  --tx:#e8e6f0;--txm:#7a788a;--txd:#4a4858;
  --ok:#3ecf8e;--warn:#f97316;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--acc);}

header{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,10,12,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--brds);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--acc),#a89cf7);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-text{font-size:.95rem;font-weight:700;letter-spacing:.04em;}
.logo-sub{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--txm);letter-spacing:.08em;}
.hacts{display:flex;gap:8px;align-items:center;}

.btn{font-family:'Syne',sans-serif;font-size:.76rem;font-weight:600;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;transition:all .18s;letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-p{background:var(--acc);color:#fff;}
.btn-p:hover{background:#8f7ef8;box-shadow:0 0 16px var(--glow);transform:translateY(-1px);}
.btn-g{background:var(--surf2);color:var(--txm);border:1px solid var(--brd);}
.btn-g:hover{background:var(--surf3);color:var(--tx);border-color:var(--acc);}
.btn-d{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2);}
.btn-d:hover{background:rgba(239,68,68,.22);}
.btn-sm{padding:5px 10px;font-size:.72rem;}

.app{margin-top:56px;padding:1.5rem;display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden;}

/* STATS */
.stats{display:flex;gap:10px;margin-bottom:1.2rem;flex-shrink:0;flex-wrap:wrap;}
.sc{background:var(--surf);border:1px solid var(--brds);border-radius:11px;padding:12px 16px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .18s;min-width:120px;flex:1;user-select:none;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc-color,var(--acc));opacity:.7;}
.sc:hover{border-color:var(--sc-color,var(--acc));transform:translateY(-2px);}
.sc.active{border-color:var(--sc-color,var(--acc));box-shadow:0 0 0 2px var(--sc-color,var(--acc));}
.sc-lbl{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--txm);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.sc-val{font-size:1.7rem;font-weight:800;line-height:1;color:var(--tx);}
.sc-sub{font-size:.66rem;color:var(--txm);margin-top:4px;}
.sc-hint{position:absolute;top:7px;right:9px;font-size:.55rem;color:var(--txd);opacity:0;transition:opacity .2s;}
.sc:hover .sc-hint{opacity:1;}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-shrink:0;flex-wrap:wrap;}
.sw{position:relative;flex:1;min-width:160px;}
.si-ic{color:var(--txd);position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;}
.search{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:9px;padding:8px 12px 8px 34px;color:var(--tx);font-family:'DM Mono',monospace;font-size:.8rem;transition:border-color .2s,box-shadow .2s;}
.search:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--glow);}
.search::placeholder{color:var(--txd);}
.fsel{background:var(--surf);border:1px solid var(--brd);border-radius:9px;padding:8px 12px;color:var(--tx);font-family:'Syne',sans-serif;font-size:.76rem;cursor:pointer;}
.fsel:focus{outline:none;border-color:var(--acc);}
.fsel option{background:var(--surf2);}
.cbtn{background:none;border:1px solid var(--brd);border-radius:7px;color:var(--txd);padding:6px 11px;cursor:pointer;font-size:.74rem;font-family:'Syne',sans-serif;transition:all .18s;display:none;align-items:center;gap:4px;}
.cbtn.show{display:flex;}
.cbtn:hover{color:var(--tx);border-color:var(--acc);}

/* TABLE */
.tbl-wrap{background:var(--surf);border:1px solid var(--brds);border-radius:13px;overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0;}
.tbl-top{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--brds);background:var(--surf);flex-shrink:0;}
.tbl-title{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--txm);letter-spacing:.08em;text-transform:uppercase;}
.tbl-cnt{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--txd);}
.tbl-scroll{overflow:auto;flex:1;position:relative;}

table{width:100%;border-collapse:collapse;table-layout:auto;}
.new-row-wrap{flex-shrink:0;overflow-x:auto;}
.new-row-wrap table{width:100%;table-layout:fixed;}

thead th{font-family:'DM Mono',monospace;font-size:.63rem;font-weight:500;color:var(--txd);letter-spacing:.1em;text-transform:uppercase;padding:9px 10px;text-align:left;border-bottom:1px solid var(--brds);background:var(--surf);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;z-index:5;overflow:hidden;transition:color .2s;}
thead th:hover{color:var(--acc2);}
.th-in{display:flex;align-items:center;gap:4px;}
.sind{opacity:.5;font-size:.7rem;}
.rh{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;background:transparent;transition:background .15s;z-index:6;}
.rh:hover,.rh.on{background:var(--acc);}
thead th{position:sticky;top:0;}

tbody tr{border-bottom:1px solid var(--brds);transition:background .12s;}
tbody tr:hover{background:var(--surf2);}
tbody tr:last-child{border-bottom:none;}
td{padding:7px 10px;font-size:.81rem;color:var(--tx);overflow:hidden;}

/* COLUMN WIDTHS — flexible, adapts to any screen */
th{min-width:0;padding:9px 10px;}
.c-nome{min-width:200px;}
.c-cpf{min-width:115px;}
.c-acao{min-width:140px;}
.c-data{min-width:85px;}
.c-etapa{min-width:180px;}
.c-atu{min-width:135px;}
.c-dpp{min-width:90px;}
td:nth-child(8),th:nth-child(8){min-width:120px;} /* TRÁFEGO */
td:nth-child(9),th:nth-child(9){min-width:100px;} /* PENDÊNCIA */
td:nth-child(10),th:nth-child(10){min-width:95px;} /* PARCELA */
.c-obs{max-width:220px;}
td:last-child,th:last-child{min-width:46px;max-width:56px;}

/* colgroup classes — used for resize */
.col-nome{max-width:none;}
.col-cpf{min-width:115px;}
.col-acao{min-width:140px;}
.col-data{min-width:85px;}
.col-etapas{min-width:180px;}
.col-atualizacao{min-width:135px;}
.col-dpp_dn{min-width:95px;}
.col-trafego_pago{min-width:120px;}
.col-pendencia{min-width:100px;}
.col-parcela{min-width:95px;}
.col-obs{min-width:180px;max-width:280px;}
.col-acts{min-width:46px;max-width:56px;width:52px;}

/* NEW ROW - FIXED ABOVE TABLE */
.new-row-fixed-wrap{background:var(--surf);border:1px solid var(--brds);border-radius:11px;margin-bottom:10px;padding:6px 0;flex-shrink:0;}
.new-row-fixed-wrap:hover{background:rgba(124,106,245,.07);}
.new-row-fixed-wrap table{width:100%;table-layout:auto;}
.new-row-fixed-wrap td{padding:6px 10px;vertical-align:middle;}
.new-row-fixed-wrap .new-inp{width:100%;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--tx);font-family:'Syne',sans-serif;font-size:.8rem;padding:3px 4px;border-radius:4px;transition:border-color .15s,background .15s;box-sizing:border-box;}
.new-row-fixed-wrap .new-inp:focus{outline:none;border-bottom-color:var(--acc);background:rgba(124,106,245,.08);}
.new-row-fixed-wrap .new-inp::placeholder{color:var(--txd);font-size:.75rem;}
.new-row-fixed-wrap .new-sel{width:100%;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--tx);font-family:'Syne',sans-serif;font-size:.78rem;padding:3px 2px;cursor:pointer;border-radius:4px;box-sizing:border-box;}
.new-row-fixed-wrap .new-sel:focus{outline:none;border-bottom-color:var(--acc);background:rgba(124,106,245,.08);}
.new-row-fixed-wrap .new-sel option{background:var(--surf2);}
.new-row-fixed-wrap .new-add-btn{background:var(--acc);border:none;color:#fff;border-radius:6px;padding:5px 12px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.74rem;font-weight:600;transition:all .18s;white-space:nowrap;}
.new-row-fixed-wrap .new-add-btn:hover{background:#8f7ef8;transform:translateY(-1px);}
.new-row-hint{font-family:'DM Mono',monospace;font-size:.6rem;color:rgba(124,106,245,.5);letter-spacing:.06em;white-space:nowrap;}

/* CELLS */
th{white-space:nowrap;}
.c-nome{cursor:default;overflow:hidden;}
.nome-t{display:block;font-weight:600;font-size:.84rem;word-break:break-word;line-height:1.35;}
.c-cpf{font-family:'DM Mono',monospace;font-size:.74rem;color:var(--txm);white-space:nowrap;}
.c-acao{white-space:nowrap;}
.etbdg{max-width:none;}
.c-click{cursor:pointer;position:relative;}
.c-click:hover{background:rgba(124,106,245,.07);}
.ehint{position:absolute;top:3px;right:4px;font-size:.55rem;opacity:0;color:var(--acc2);transition:opacity .15s;pointer-events:none;}
.c-click:hover .ehint{opacity:1;}
.c-data,.c-dpp{font-family:'DM Mono',monospace;font-size:.72rem;white-space:nowrap;color:var(--txm);}
.c-atu{white-space:nowrap;}
.atu-w{display:flex;align-items:center;gap:5px;}
.atu-t{font-family:'DM Mono',monospace;font-size:.71rem;color:var(--txm);}
.rfbtn{background:none;border:none;cursor:pointer;color:var(--txd);font-size:.82rem;padding:2px 4px;border-radius:4px;transition:all .18s;display:inline-flex;}
.rfbtn:hover{color:var(--acc2);background:var(--glow);transform:rotate(180deg);}
.c-obs{white-space:pre-wrap;word-break:break-word;font-size:.78rem;color:var(--txm);line-height:1.48;cursor:pointer;border-radius:5px;transition:background .14s;}
.c-obs:hover{background:rgba(124,106,245,.07);color:var(--tx);}
.c-act{white-space:nowrap;}
.racts{display:flex;gap:4px;}
.rbtn{background:none;border:none;cursor:pointer;color:var(--txd);padding:4px;border-radius:5px;transition:all .14s;font-size:.85rem;}
.rbtn:hover{background:var(--surf3);}
.rbtn.ed:hover{color:var(--acc2);}
.rbtn.dl:hover{color:#ef4444;}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:.67rem;font-weight:600;letter-spacing:.03em;white-space:nowrap;}
.b-ok{background:rgba(62,207,142,.12);color:var(--ok);border:1px solid rgba(62,207,142,.2);}
.b-pend{background:rgba(249,115,22,.12);color:var(--warn);border:1px solid rgba(249,115,22,.2);}
.pbdg{font-family:'DM Mono',monospace;font-size:.63rem;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);padding:2px 7px;border-radius:4px;white-space:nowrap;}
.abadge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:.64rem;font-weight:700;letter-spacing:.03em;white-space:nowrap;}
.ac-jud{background:rgba(124,106,245,.12);color:#a89cf7;border:1px solid rgba(124,106,245,.22);}
.ac-exe{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.22);}
.ac-ben{background:rgba(6,182,212,.12);color:#22d3ee;border:1px solid rgba(6,182,212,.22);}
.ac-sal{background:rgba(167,139,250,.12);color:#c4b5fd;border:1px solid rgba(167,139,250,.22);}
.ac-bpc{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.22);}
.ac-trb{background:rgba(236,72,153,.12);color:#f472b6;border:1px solid rgba(236,72,153,.22);}
.ac-ali{background:rgba(132,204,22,.12);color:#a3e635;border:1px solid rgba(132,204,22,.22);}
.ac-reg{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.22);}
.etbdg{display:inline-block;padding:2px 8px;border-radius:5px;font-size:.7rem;font-weight:600;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;}

/* INLINE DROPDOWN */
.idrop{position:fixed;z-index:1000;background:#1a1a24;border:1px solid var(--acc);border-radius:9px;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.6);overflow-y:auto;max-height:340px;}
@keyframes ddin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.idrop{animation:ddin .14s ease;}
.iopt{padding:8px 14px;font-size:.74rem;cursor:pointer;font-family:'Syne',sans-serif;color:var(--tx);transition:background .12s;display:flex;align-items:center;gap:8px;white-space:normal;line-height:1.3;word-wrap:break-word;}
.iopt span:first-child{flex:1;}
.iopt:hover{background:rgba(124,106,245,.12);color:var(--acc2);}
.iopt.sel{background:rgba(124,106,245,.1);}
.iopt.sel::after{content:' ✓';color:var(--acc2);margin-left:auto;font-size:.7rem;}
.iopt-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--txd);}
.empty-icon{font-size:2rem;margin-bottom:10px;opacity:.4;}
.empty-text{font-size:.82rem;}

/* MODALS */
.ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:1rem;}
.ov.open{display:flex;}
.modal{background:var(--surf);border:1px solid var(--brd);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.65);animation:modin .22s cubic-bezier(.34,1.56,.64,1);}
.modal-sm{max-width:460px;}
@keyframes modin{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mh{padding:18px 22px 13px;border-bottom:1px solid var(--brds);display:flex;align-items:center;justify-content:space-between;}
.mt{font-size:.98rem;font-weight:700;}
.mc{background:var(--surf2);border:1px solid var(--brd);color:var(--txm);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;}
.mc:hover{background:var(--surf3);color:var(--tx);}
.mb{padding:18px 22px;}
.mf{padding:13px 22px;border-top:1px solid var(--brds);display:flex;gap:10px;justify-content:flex-end;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg1{grid-column:1/-1;}
.fl{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--txm);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:5px;}
.fi,.fs,.fta{background:var(--surf2);border:1px solid var(--brd);border-radius:7px;padding:9px 11px;color:var(--tx);font-family:'Syne',sans-serif;font-size:.8rem;width:100%;transition:border-color .2s,box-shadow .2s;}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--glow);}
.fs option{background:var(--surf2);}
.fta{resize:vertical;min-height:80px;}
.fgrp{display:flex;flex-direction:column;}

/* COLOR PICKER PANEL */
.color-panel{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-top:8px;display:none;flex-direction:column;gap:10px;}
.color-panel.open{display:flex;}
.color-row{display:flex;align-items:center;gap:10px;}
.color-swatch{width:36px;height:36px;border-radius:7px;border:2px solid rgba(255,255,255,.15);flex-shrink:0;cursor:pointer;transition:transform .15s;}
.color-swatch:hover{transform:scale(1.1);}
.hex-input{font-family:'DM Mono',monospace;font-size:.82rem;background:var(--surf3);border:1px solid var(--brd);border-radius:7px;padding:7px 10px;color:var(--tx);width:110px;letter-spacing:.05em;}
.hex-input:focus{outline:none;border-color:var(--acc);}
.native-picker{position:absolute;opacity:0;width:0;height:0;pointer-events:none;}
.color-actions{display:flex;gap:8px;}

/* MANAGE OPTIONS */
.opt-col-sel{font-family:'Syne',sans-serif;font-size:.78rem;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:7px 10px;color:var(--tx);cursor:pointer;margin-bottom:12px;width:100%;}
.opt-col-sel:focus{outline:none;border-color:var(--acc);}
.opt-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;max-height:260px;overflow-y:auto;padding-right:4px;}
.opt-row{display:flex;align-items:center;gap:8px;background:var(--surf2);border-radius:8px;padding:7px 10px;border:1px solid var(--brds);transition:border-color .15s;}
.opt-row:hover{border-color:var(--brd);}
.opt-dot{width:22px;height:22px;border-radius:6px;flex-shrink:0;cursor:pointer;border:2px solid rgba(255,255,255,.12);transition:transform .15s,box-shadow .15s;}
.opt-dot:hover{transform:scale(1.12);box-shadow:0 0 0 2px var(--acc);}
.opt-dot.active{box-shadow:0 0 0 2px var(--acc);}
.opt-name{flex:1;font-size:.82rem;color:var(--tx);}
.opt-ed{background:none;border:none;cursor:pointer;color:var(--txd);font-size:.85rem;padding:3px 5px;border-radius:4px;transition:all .14s;}
.opt-ed:hover{color:var(--acc2);background:rgba(124,106,245,.1);}
.opt-del{background:none;border:none;cursor:pointer;color:var(--txd);font-size:.85rem;padding:3px 5px;border-radius:4px;transition:all .14s;}
.opt-del:hover{color:#ef4444;background:rgba(239,68,68,.1);}
.add-opt-row{display:flex;gap:8px;align-items:center;}
.add-opt-name{flex:1;background:var(--surf2);border:1px solid var(--brd);border-radius:7px;padding:8px 11px;color:var(--tx);font-family:'Syne',sans-serif;font-size:.8rem;}
.add-opt-name:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--glow);}
.add-opt-dot{width:36px;height:36px;border-radius:7px;flex-shrink:0;cursor:pointer;border:2px solid rgba(255,255,255,.15);transition:transform .15s;}
.add-opt-dot:hover{transform:scale(1.08);}

.inline-color-editor{background:var(--surf3);border:1px solid var(--acc);border-radius:9px;padding:12px;margin-top:4px;display:flex;flex-direction:column;gap:10px;}
.float-color-editor{background:var(--surf3);border:1px solid var(--acc);border-radius:9px;padding:12px;display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:220px;}
.ice-row{display:flex;align-items:center;gap:10px;}
.ice-swatch{width:36px;height:36px;border-radius:7px;border:2px solid rgba(255,255,255,.2);flex-shrink:0;cursor:pointer;}
.ice-hex{font-family:'DM Mono',monospace;font-size:.82rem;background:var(--surf2);border:1px solid var(--brd);border-radius:7px;padding:7px 10px;color:var(--tx);width:110px;letter-spacing:.05em;}
.ice-hex:focus{outline:none;border-color:var(--acc);}
.ice-actions{display:flex;gap:8px;}

/* DETAIL */
.ds{margin-bottom:16px;}
.dst{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--txd);letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--brds);}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.di{background:var(--surf2);border-radius:7px;padding:9px 12px;}
.di.full{grid-column:1/-1;}
.dil{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--txd);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.dv{font-size:.83rem;font-weight:600;color:var(--tx);word-break:break-word;}

/* CONFIRM */
.cfm{background:var(--surf);border:1px solid rgba(239,68,68,.3);border-radius:13px;padding:22px;width:100%;max-width:360px;text-align:center;animation:modin .2s ease;}
.cfm-i{font-size:2rem;margin-bottom:10px;}
.cfm-t{font-size:.98rem;font-weight:700;margin-bottom:7px;}
.cfm-s{font-size:.8rem;color:var(--txm);margin-bottom:18px;}
.cfm-a{display:flex;gap:10px;justify-content:center;}

/* OBS */
.obs-modal{max-width:480px;}

/* TOAST */
.toasts{position:fixed;bottom:20px;right:20px;z-index:400;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:10px 16px;font-size:.8rem;display:flex;align-items:center;gap:7px;animation:tin .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 28px rgba(0,0,0,.4);transition:opacity .4s;}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.t-ok{border-color:rgba(62,207,142,.3);}
.t-ok .td{color:var(--ok);}
.t-err{border-color:rgba(239,68,68,.3);}
.t-err .td{color:#ef4444;}

#fi{display:none;}
.hidden-native{position:absolute;width:0;height:0;opacity:0;pointer-events:none;}

/* MOBILE */
@media(max-width:768px){
  header{padding:0 .8rem;}.logo-text{font-size:.82rem;}.logo-icon{display:none;}.logo-sub{display:none;}
  .hacts{gap:4px;}.hacts .btn{padding:6px 8px;font-size:.7rem;}.hacts .btn .btn-label{display:none;}
  .app{margin-top:52px;padding:.8rem;height:calc(100vh - 52px);}
  .stats{gap:6px;margin-bottom:.8rem;display:grid;grid-template-columns:1fr 1fr;}.sc{min-width:0;}.sc-val{font-size:1.3rem;}.sc-hint{display:none;}
  .toolbar{gap:6px;margin-bottom:.8rem;}.sw{min-width:100%;order:1;}.fsel{order:2;flex:1;min-width:0;padding:7px 10px;font-size:.7rem;}
  table{min-width:900px;}
  .tbl-scroll{min-height:100px;}
  .new-row-fixed-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tbl-top{padding:8px 12px;}.tbl-title{font-size:.65rem;}
  td{padding:5px 7px;font-size:.75rem;}
  .login-box{margin:0 16px;padding:24px 20px;}
}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.login-screen.hidden{display:none;}
.login-box{background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:32px 36px;width:100%;max-width:360px;box-shadow:0 24px 80px rgba(0,0,0,.65);}
.login-icon{width:48px;height:48px;margin:0 auto 16px;background:linear-gradient(135deg,var(--acc),#a89cf7);border-radius=12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.login-title{text-align:center;font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.login-sub{text-align:center;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--txm);letter-spacing:.08em;margin-bottom:24px;}
.login-err{text-align:center;font-size:.78rem;color:#ef4444;margin-bottom:12px;display:none;}
.login-label{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--txm);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:5px;}
</style>
</head>

<script>
// ═══════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://oeurtiyeivcqjhqsgtaa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ldXJ0aXllaXZjcWpocXNndGFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTg0NTgsImV4cCI6MjA5MDk5NDQ1OH0.DoohZpxS2SA0JqHRCBpBTH8FxZFIN2VXBBDDz5MnB4M';
let sb;
let currentUser=null;

function initSB(){
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
}

function normEmail(u){
  if(!u)return u;
  if(u.indexOf('@')>=0)return u;
  return u+'@cerijus.com';
}

async function doLogin(){
  var u=document.getElementById('LOGIN_USER').value.trim();
  var p=document.getElementById('LOGIN_PASS').value;
  var errEl=document.getElementById('LOGIN_ERR');
  if(!u||!p){errEl.textContent='Preencha todos os campos';errEl.style.display='block';return;}
  var email=normEmail(u);
  errEl.style.display='none';
  try{
    var result=await sb.auth.signInWithPassword({email:email,password:p});
    if(result.error)throw result.error;
    currentUser=result.data.user;
    sessionStorage.setItem('cj_auth','1');
    document.getElementById('LOGIN_SCREEN').classList.add('hidden');
    loadAll();
  }catch(e){
    errEl.textContent='Erro: '+e.message;
    errEl.style.display='block';
  }
}

function checkAuth(){
  if(sessionStorage.getItem('cj_auth')){
    document.getElementById('LOGIN_SCREEN').classList.add('hidden');
  }
  document.getElementById('LOGIN_USER').focus();
}

function showReg(){
  document.getElementById('LOGIN_FORM').style.display='none';
  document.getElementById('REG_FORM').style.display='block';
  document.getElementById('LOGIN_ERR').style.display='none';
  document.getElementById('REG_USER').focus();
}

function showLogin(){
  document.getElementById('REG_FORM').style.display='none';
  document.getElementById('LOGIN_FORM').style.display='block';
  document.getElementById('LOGIN_ERR').style.display='none';
  document.getElementById('LOGIN_USER').focus();
}

async function doReg(){
  var u=document.getElementById('REG_USER').value.trim();
  var p=document.getElementById('REG_PASS').value;
  var p2=document.getElementById('REG_PASS2').value;
  var errEl=document.getElementById('LOGIN_ERR');
  if(!u||!p||!p2){errEl.textContent='Preencha todos os campos';errEl.style.display='block';return;}
  if(p!==p2){errEl.textContent='As senhas não conferem';errEl.style.display='block';return;}
  if(p.length<6){errEl.textContent='A senha deve ter pelo menos 6 caracteres';errEl.style.display='block';return;}
  errEl.style.display='none';
  try{
    var result=await sb.auth.signUp({email:normEmail(u),password:p});
    if(result.error)throw result.error;
    errEl.style.color='var(--ok)';
    errEl.textContent='Conta criada! Agora faça login.';
    errEl.style.display='block';
    document.getElementById('REG_PASS').value='';
    document.getElementById('REG_PASS2').value='';
    setTimeout(showLogin,1500);
  }catch(e){
    errEl.style.color='#ef4444';
    errEl.textContent='Erro: '+e.message;
    errEl.style.display='block';
  }
}

// ═══════════════════════════════════════════════
// OPTIONS & COLORS
// ═══════════════════════════════════════════════
const DEF_ET=[
  {v:'Emitir Guia SM',c:'#ffcfc9'},{v:'Aguardando Pagamento de Guia',c:'#ffc8aa'},
  {v:'Guia Paga',c:'#bfe1f6'},{v:'Aguardando Doc para Protocolar',c:'#753800'},
  {v:'Aguardando Protocolar Analita',c:'#b10202'},{v:'Aguardando Pericia Médica INSS',c:'#ac7410'},
  {v:'Benefício em Análise Adm',c:'#ffe5a0'},{v:'Benefício Aprovado/Aguard pagamento',c:'#0a53a8'},
  {v:'Beneficio Indeferido',c:'#b10202'},{v:'Análise Recurso',c:'#ffe5a0'},
  {v:'Recurso Aprovado/Aguard Pagamento',c:'#0a53a8'},{v:'Aguardando Doc para Judicializar',c:'#753800'},
  {v:'Aguardando Judicializar Analita',c:'#b10202'},{v:'Aguardando Pericia Federal',c:'#ac7410'},
  {v:'Judicial Aprovado - Aguard Pagamento',c:'#0a53a8'},{v:'Recebendo Parcelas',c:'#11734b'},
  {v:'Finalizado',c:'#11734b'},{v:'Execução',c:'#b10202'},{v:'JUDICIAL',c:'#e8eaed'},
];
const DEF_AC=[
  {v:'JUDICIAL',c:'#a89cf7'},{v:'BENEFICIO POR INCAPACIDADE',c:'#22d3ee'},
  {v:'EXECUÇÃO',c:'#60a5fa'},{v:'SALARIO MATERNIDADE',c:'#c4b5fd'},
  {v:'BPC LOAS',c:'#fbbf24'},{v:'TRABALHISTA',c:'#f472b6'},
  {v:'ALIMENTOS',c:'#a3e635'},{v:'SALARIO MATERNIDADE PRORROG',c:'#d8b4fe'},
  {v:'REGULAMENTAÇÃO DE VISITAS',c:'#fb923c'},
];

function loadOpts(k,d){ return JSON.parse(localStorage.getItem('cj_op_'+k)||'null')||d.map(o=>({...o})); }
function saveOpts(k,a){ localStorage.setItem('cj_op_'+k,JSON.stringify(a)); }

let ET_OPTS=loadOpts('et',DEF_ET);
let AC_OPTS=loadOpts('ac',DEF_AC);

function getOpts(col){ return col==='etapas'?ET_OPTS:AC_OPTS; }
function setOpts(col,a){ if(col==='etapas'){ET_OPTS=a;saveOpts('et',a);}else{AC_OPTS=a;saveOpts('ac',a);} }

function etapaStyle(v){
  const o=ET_OPTS.find(x=>x.v===v); if(!o)return '';
  const h=o.c,r=parseInt(h.slice(1,3),16)||128,g=parseInt(h.slice(3,5),16)||128,b=parseInt(h.slice(5,7),16)||128;
  return `color:${h};background:rgba(${r},${g},${b},.14);border:1px solid rgba(${r},${g},${b},.28);`;
}
function acaoClass(a){
  const u=(a||'').toUpperCase();
  if(u.includes('JUDICIAL')&&!u.includes('BENEFICIO'))return 'ac-jud';
  if(u.includes('EXECU'))return 'ac-exe';
  if(u.includes('INCAPACIDADE'))return 'ac-ben';
  if(u.includes('MATERNIDADE'))return 'ac-sal';
  if(u.includes('BPC')||u.includes('LOAS'))return 'ac-bpc';
  if(u.includes('TRABALHISTA'))return 'ac-trb';
  if(u.includes('ALIMENTOS'))return 'ac-ali';
  return 'ac-reg';
}
function acaoStyle(a){
  const u=(a||'').toUpperCase();
  const o=AC_OPTS.find(x=>u===x.v.toUpperCase());
  if(!o)return '';
  const h=o.c,r=parseInt(h.slice(1,3),16)||128,g=parseInt(h.slice(3,5),16)||128,b=parseInt(h.slice(5,7),16)||128;
  return `color:${h};background:rgba(${r},${g},${b},.12);border:1px solid rgba(${r},${g},${b},.22);`;
}

// ═══════════════════════════════════════════════

}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Format CPF: 12345678901 -> 123.456.789-01
function fmtCPF(v){
  const d=(v||'').replace(/\D/g,'');
  if(d.length<=3)return d;
  if(d.length<=6)return d.slice(0,3)+'.'+d.slice(3);
  if(d.length<=9)return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6);
  return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6,9)+'-'+d.slice(9,11);
}

// Live CPF formatting on input
function onCPFInput(el){
  const raw=el.value.replace(/\D/g,'').slice(0,11);
  const formatted=fmtCPF(raw);
  if(el.value!==formatted){el.value=formatted;}
}


function fmtDT(v){
  if(!v)return '—';
  try{
    const s=v.toString();
    // Parse as local time (the date string is already in local format from now())
    const dt=s.includes('T')?new Date(s):new Date(s+'T00:00:00');
    if(isNaN(dt))return s.slice(0,10);
    // Format in Brazil timezone (Brasilia)
    const opts={timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false};
    const parts=new Intl.DateTimeFormat('pt-BR',opts).formatToParts(dt);
    const get=(type)=>(parts.find(p=>p.type===type)||{}).value||'';
    return `${get('day')}/${get('month')}/${get('year')} ${get('hour')}:${get('minute')}`;
  }catch(e){return String(v);}
}
function fmtD(v){if(!v)return '—';const p=v.slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:v;}
function trafegoLbl(v){return v==='Trafego Pago'?'💰 Tráfego Pago':v==='Organico'?'🌱 Orgânico':v||'—';}

let RES=null;
function startR(e,i){
  e.preventDefault();
  RES={i,x0:e.clientX,el:e.target,sw:getW(COLS[i])};
  const rh=e.target;rh.classList.add('on');
  const mv=ev=>{

    const nw=Math.max(50,RES.sw+diff);
    CW[RES.i]=nw;

  };
  const up=()=>{rh.classList.remove('on');document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);RES=null;};

}
function colSel(k){return '.col-'+k;}
function getW(k){const el=document.querySelector(colSel(k));if(!el)return DW[COLS.indexOf(k)];var w=getComputedStyle(el).width;return parseFloat(w);}

function applyFilter(){

  });
  const any=q||a||e||p||_stT||_stP||STATK;
  document.getElementById('CB').classList.toggle('show',!!any);

}

// ── INLINE DROPDOWN ──
let DROP=null;
function closeDrop(){if(DROP){DROP.remove();DROP=null;}}

function openDrop(e,opts,curVal,onPick){
  e.stopPropagation();closeDrop();
  const td=e.currentTarget;
  const menu=document.createElement('div');menu.className='idrop';menu.onclick=ev=>ev.stopPropagation();
  // Find longest text to determine if we need smaller font
  let maxLen=0;
  opts.forEach(o=>{const v=typeof o==='string'?o:o.v;if(v.length>maxLen)maxLen=v.length;});
  if(maxLen>30)menu.style.fontSize='.66rem';
  opts.forEach(o=>{
    const val=typeof o==='string'?o:o.v,col=typeof o==='string'?null:o.c;
    const d=document.createElement('div');d.className='iopt'+(val===curVal?' sel':'');
    if(col){const dot=document.createElement('span');dot.className='iopt-dot';dot.style.background=col;d.appendChild(dot);}
    const txt=document.createElement('span');txt.textContent=val;d.appendChild(txt);
    d.addEventListener('mousedown',ev=>{ev.preventDefault();ev.stopPropagation();onPick(val);closeDrop();});
    menu.appendChild(d);
  });
  document.body.appendChild(menu);DROP=menu;
  // Measure needed width and position near the clicked element
  const mr=menu.getBoundingClientRect();
  const neededW=Math.max(240,mr.width);
  const r=td.getBoundingClientRect();
  const menuH=340;
  let top=r.bottom+2;
  if(top+menuH>window.innerHeight-8)top=r.top-menuH-2;
  top=Math.max(8,Math.min(top,window.innerHeight-menuH-8));
  menu.style.top=top+'px';
  menu.style.left=Math.max(8,Math.min(r.left,window.innerWidth-neededW-8))+'px';
  menu.style.width=Math.min(neededW,window.innerWidth-16)+'px';
  const outside=ev=>{if(!menu.contains(ev.target)){closeDrop();document.removeEventListener('click',outside,true);document.getElementById('TS').removeEventListener('scroll',outside);}};
  setTimeout(()=>{document.addEventListener('click',outside,true);document.getElementById('TS').addEventListener('scroll',outside,{once:true});},0);
}

function parcelaCell(show,opts){
  if(!show)return '<span class="new-row-hint" id="PC_H">—</span>';
  return `<select class="new-sel" onchange="NR.parcela=this.value" id="NR_parcela"><option value="">—</option>${opts.map(o=>`<option value="${o}">${o.replace('Recebeu ','')}</option>`).join('')}</select>`;
}

function nrEtapaChanged(v){
  NR.etapas=v;
  const td=document.getElementById('PC_TD');
  if(!td)return;
  const show=v==='Recebendo Parcelas';
  td.innerHTML=parcelaCell(show,['Recebeu Parcela 1','Recebeu Parcela 2','Recebeu Parcela 3','Recebeu Parcela 4','Recebeu Parcela 5','Recebeu Parcela 6']);
  if(show&&NR.parcela){const pe=document.getElementById('NR_parcela');if(pe)pe.value=NR.parcela;}
  if(!show)NR.parcela='';
}

function restoreNRValues(){
  ['acao','trafego_pago','pendencia','parcela'].forEach(f=>{
    const el=document.getElementById('NR_'+f);if(el&&NR[f])el.value=NR[f];
  });
  const etEl=document.getElementById('NR_etapas');
  if(etEl&&NR.etapas)etEl.value=NR.etapas;
  if(NR.etapas==='Recebendo Parcelas'){
    const td=document.getElementById('PC_TD');
    if(td)td.innerHTML=parcelaCell(true,['Recebeu Parcela 1','Recebeu Parcela 2','Recebeu Parcela 3','Recebeu Parcela 4','Recebeu Parcela 5','Recebeu Parcela 6']);
  }
  if(NR.parcela){const pe=document.getElementById('NR_parcela');if(pe)pe.value=NR.parcela;}
}

function renderNewRowFixed(){
  document.getElementById('NR_FIXED').innerHTML=buildNewRowFixed();
  restoreNRValues();
}

function commitNewRow(){
  const nome=(NR.nome||'').trim();
  if(!nome){
    const el=document.getElementById('NR_nome');
    if(el){el.style.borderBottomColor='var(--warn)';setTimeout(()=>el.style.borderBottomColor='',1500);}
    toast('Nome é obrigatório','err');return;
  }
  DB.push({_id:NID++,nome,cpf:NR.cpf,acao:NR.acao,data:NR.data,etapas:NR.etapas,atualizacao:now(),dpp_dn:NR.dpp_dn,trafego_pago:NR.trafego_pago,pendencia:NR.pendencia,parcela:NR.parcela,obs:NR.obs});
  // Reset
  NR={nome:'',cpf:'',acao:'',data:'',etapas:'',dpp_dn:'',trafego_pago:'',pendencia:'',parcela:'',obs:''};
  persist();buildFilters();applyFilter();renderStats();renderNewRowFixed();
  toast('Contrato adicionado ✓');
  // Focus name field
  setTimeout(()=>{const el=document.getElementById('NR_nome');if(el)el.focus();},80);
}

  document.getElementById('fn').value=c.nome||'';document.getElementById('fc').value=fmtCPF((c.cpf||'').replace(/\D/g,''));

function saveC(){
  const nm=document.getElementById('fn').value.trim();if(!nm){toast('Nome obrigatório','err');return;}
  const newE=document.getElementById('fe').value;
  let atu=now();
  if(EID!==null){const old=DB.find(c=>c._id===EID);if(old&&old.etapas===newE)atu=old.atualizacao;}
  // Normalize CPF: strip non-digits then format
  const rawCpf=(document.getElementById('fc').value||'').replace(/\D/g,'');
  const cpf=rawCpf.length>=11?fmtCPF(rawCpf):rawCpf;
  const d={nome:nm,cpf,acao:document.getElementById('fa').value,data:document.getElementById('fd').value,etapas:newE,atualizacao:atu,dpp_dn:document.getElementById('fdn').value,trafego_pago:document.getElementById('ft').value,pendencia:document.getElementById('fp').value,parcela:document.getElementById('fpc').value,obs:document.getElementById('fo').value.trim()};
  const i=DB.findIndex(c=>c._id===EID);if(i!==-1)DB[i]={...d,_id:EID};
  toast('Atualizado');persist();closeM();buildFilters();applyFilter();renderStats();
}

let EDIT_CELL_ID=null,EDIT_CELL_FIELD=null;
function openEditCell(id,field,curVal){
  EDIT_CELL_ID=id;EDIT_CELL_FIELD=field;
  const cell=event.currentTarget;
  const input=document.createElement('input');
  input.type='date';
  input.value=curVal||'';
  input.style.cssText='width:100%;background:var(--surf3);border:1px solid var(--acc);border-radius:5px;padding:4px 6px;color:var(--tx);font-family:DM Mono,monospace;font-size:.72rem';
  input.onblur=()=>saveEditCell();
  input.onkeydown=e=>{if(e.key==='Enter')saveEditCell();if(e.key==='Escape')cancelEditCell();};
  cell.innerHTML='';
  cell.appendChild(input);
  input.focus();
}
function saveEditCell(){
  if(EDIT_CELL_ID===null)return;
  const cell=event.target;
  upd(EDIT_CELL_ID,EDIT_CELL_FIELD,cell.value);
  EDIT_CELL_ID=null;EDIT_CELL_FIELD=null;
}
function cancelEditCell(){
  if(EDIT_CELL_ID===null)return;
  renderTable();
  EDIT_CELL_ID=null;EDIT_CELL_FIELD=null;
}

let EDITING_OPT_COL=null; // col being edited
let EDITING_OPT_IDX=null; // index in opts array
let EDITING_TEMP_COLOR=null;
let EDITING_OPT_NAME_IDX=null; // editing name inline
let ADD_TEMP_COLOR='#7c6af5';

function openManageOpts(){renderOptList();document.getElementById('MOP').classList.add('open');}
function closeMOP(){closeInlineEditor();document.getElementById('MOP').classList.remove('open');}

function renderOptList(){
  const col=document.getElementById('OPCOL').value;
  const opts=getOpts(col);
  document.getElementById('OPTL').innerHTML=opts.map((o,i)=>`
    <div class="opt-row" id="OROW_${i}">
      <div class="opt-dot ${EDITING_OPT_COL===col&&EDITING_OPT_IDX===i?'active':''}" style="background:${o.c}" title="Clique para alterar cor" onclick="openInlineEditor('${col}',${i},'${o.c}')" data-idx="${i}"></div>
      <span class="opt-name" id="ONM_${i}" style="${EDITING_OPT_NAME_IDX===i?'display:none':''}" ondblclick="openNameEdit(${i},'${o.v}')">${esc(o.v)}</span>
      ${EDITING_OPT_NAME_IDX===i?renderNameEditor(o.v):''}
      <button class="opt-ed" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--txd);font-size:.78rem;padding:3px 5px;border-radius:4px;transition:all .14s;" onclick="openNameEdit(${i},'${o.v}')" title="Editar nome">✏️</button>
      <button class="opt-del" onclick="delOpt('${col}',${i})" title="Remover">✕</button>
    </div>
    ${EDITING_OPT_COL===col&&EDITING_OPT_IDX===i?renderInlineEditor(o.c):''}
  `).join('');
  // Restore add color dot
  document.getElementById('ADOT').style.background=ADD_TEMP_COLOR;
}

function renderInlineEditor(currentColor){
  return `<div class="float-color-editor" id="ICE" style="min-width:220px;position:relative;">
    <div style="font-family:'DM Mono',monospace;font-size:.62rem;color:var(--txm);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">Cor</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="position:relative;width:36px;height:36px;">
        <div style="width:36px;height:36px;border-radius:7px;border:2px solid rgba(255,255,255,.15);cursor:pointer;background:${currentColor};" id="ICE_SW" onclick="document.getElementById('INLINE_NCP').click()"></div>
        <input type="color" id="INLINE_NCP" value="${currentColor}" style="position:absolute;top:0;left:0;opacity:0;width:36px;height:36px;cursor:pointer;" onchange="onNativeColorPick(this.value)">
      </div>
      <input type="text" id="ICE_HEX" value="${currentColor}" maxlength="7" placeholder="#rrggbb" style="font-family:'DM Mono',monospace;font-size:.82rem;background:var(--surf2);border:1px solid var(--brd);border-radius:7px;padding:7px 10px;color:var(--tx);width:100px;letter-spacing:.05em;" oninput="onEditHexInput(this.value)">
    </div>
    <div style="display:flex;gap:6px;margin-top:10px;">
      <button class="btn btn-p btn-sm" onclick="confirmEditColor()" style="flex:1;">Salvar</button>
      <button class="btn btn-g btn-sm" onclick="closeInlineEditor()" style="flex:1;">Cancelar</button>
    </div>
  </div>`;
}

function openInlineEditor(col,idx,currentColor){
  if(EDITING_OPT_COL===col&&EDITING_OPT_IDX===idx){closeInlineEditor();return;}
  EDITING_OPT_COL=col;EDITING_OPT_IDX=idx;EDITING_TEMP_COLOR=currentColor;
  const dotEl=document.querySelector(`.opt-dot[data-idx="${idx}"]`);
  const fe=document.getElementById('FLOAT_EDITOR');
  fe.innerHTML=renderInlineEditor(currentColor);
  fe.style.display='block';
  // Update swatch color after render
  setTimeout(()=>{
    const sw=document.getElementById('ICE_SW');
    if(sw)sw.style.background=currentColor;
  },5);
  if(dotEl){
    const r=dotEl.getBoundingClientRect();
    let top=r.bottom+4;
    let left=r.left;
    if(top+150>window.innerHeight)top=r.top-150-4;
    if(left+210>window.innerWidth)left=window.innerWidth-210-8;
    if(left<8)left=8;
    fe.style.top=top+'px';
    fe.style.left=left+'px';
  }
  const outside=ev=>{if(!fe.contains(ev.target)){closeInlineEditor();document.removeEventListener('click',outside);};};
  setTimeout(()=>document.addEventListener('click',outside),10);
}

function closeInlineEditor(){
  EDITING_OPT_COL=null;EDITING_OPT_IDX=null;EDITING_TEMP_COLOR=null;
  const fe=document.getElementById('FLOAT_EDITOR');
  if(fe)fe.style.display='none';
  renderOptList();
}

function onEditHexInput(v){
  if(/^#[0-9a-fA-F]{6}$/.test(v)){
    EDITING_TEMP_COLOR=v;
    const sw=document.getElementById('ICE_SW');if(sw)sw.style.background=v;
    const ncp=document.getElementById('INLINE_NCP');if(ncp)ncp.value=v;
  }
}

// Called from native color picker
function onNativeColorPick(v){
  EDITING_TEMP_COLOR=v;
  const sw=document.getElementById('ICE_SW');if(sw)sw.style.background=v;
  const hex=document.getElementById('ICE_HEX');if(hex)hex.value=v;
}

// Legacy alias
function onNativeColorInput(v){onNativeColorPick(v);}

function confirmEditColor(){
  if(EDITING_OPT_COL===null||EDITING_OPT_IDX===null)return;
  const opts=getOpts(EDITING_OPT_COL);
  opts[EDITING_OPT_IDX].c=EDITING_TEMP_COLOR;
  setOpts(EDITING_OPT_COL,opts);
  closeInlineEditor();
  applyFilter();renderStats();
  toast('Cor atualizada');
}

function onAddColorInput(v){

function onAddHexInput(v){

    ADD_TEMP_COLOR=v;

function confirmAddColor(){

function cancelAddColor(){document.getElementById('ACEP').style.display='none';}

function addOpt(){
  const col=document.getElementById('OPCOL').value;
  const name=document.getElementById('OPTN').value.trim();
  if(!name){toast('Digite o nome da opção','err');return;}
  const opts=getOpts(col);
  if(opts.find(o=>o.v===name)){toast('Opção já existe','err');return;}
  opts.push({v:name,c:ADD_TEMP_COLOR});
  setOpts(col,opts);
  document.getElementById('OPTN').value='';
  document.getElementById('ACEP').style.display='none';
  populateEtapaSelect();buildFilters();renderOptList();applyFilter();
  toast(`"${name}" adicionado`);
}

function delOpt(col,i){
  const opts=getOpts(col);opts.splice(i,1);setOpts(col,opts);
  if(EDITING_OPT_COL===col&&EDITING_OPT_IDX===i)closeInlineEditor();
  else renderOptList();
  populateEtapaSelect();buildFilters();applyFilter();
}

  <button class="btn btn-p btn-sm" onclick="saveNameEdit()">OK</button>`;
}

function openNameEdit(i,curName){
  EDITING_OPT_NAME_IDX=i;
  renderOptList();
  setTimeout(()=>{const inp=document.getElementById('ONINP');if(inp){inp.focus();inp.select();}},10);
}

function saveNameEdit(){
  const col=document.getElementById('OPCOL').value;
  const opts=getOpts(col);
  const newName=document.getElementById('ONINP').value.trim();
  const field=col==='ac'?'acao':'etapas';
  const oldName=opts[EDITING_OPT_NAME_IDX].v;
  if(!newName){toast('Nome não pode ser vazio','err');return;}
  if(opts.find(o=>o.v===newName)&&opts.indexOf(opts.find(o=>o.v===newName))!==EDITING_OPT_NAME_IDX){toast('Já existe uma opção com esse nome','err');return;}
  opts[EDITING_OPT_NAME_IDX].v=newName;
  setOpts(col,opts);
  // Update all contracts that have the old value
  var updated=0;
  DB.forEach(function(c){if(c[field]===oldName){c[field]=newName;updated++;}});
  if(updated){persist();}
  EDITING_OPT_NAME_IDX=null;
  closeInlineEditor();
  populateEtapaSelect();buildFilters();applyFilter();renderStats();
  toast('Nome atualizado em '+updated+' contrato(s)');
}

function cancelNameEdit(){
  EDITING_OPT_NAME_IDX=null;
  renderOptList();
}

// ── IMPORT / EXPORT ──
function doImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1});let hr=-1;for(let i=0;i<Math.min(rows.length,5);i++){if(rows[i]&&rows[i].some(c=>typeof c==='string'&&c.toUpperCase().includes('NOME'))){hr=i;break;}}if(hr===-1){toast('Cabeçalho não encontrado','err');return;}const hs=rows[hr].map(h=>(h||'').toString().trim().toUpperCase());const ix=k=>hs.findIndex(h=>h.includes(k));const fd=v=>{if(!v)return '';if(v instanceof Date)return v.toISOString().slice(0,19);if(typeof v==='string'&&v.length>=8)return v.slice(0,10);return String(v);};const imp=[];for(let i=hr+1;i<rows.length;i++){const row=rows[i];if(!row||!row[ix('NOME')])continue;imp.push({_id:NID++,nome:String(row[ix('NOME')]||'').trim().replace(/\n/g,''),cpf:String(row[ix('CPF')]||'').trim(),acao:String(row[ix('AÇÃO')]||row[ix('ACAO')]||'').trim(),data:fd(row[ix('DATA')]),etapas:String(row[ix('ETAP')]||'').trim(),atualizacao:fd(row[ix('ATUALIZ')])||now(),dpp_dn:fd(row[ix('DPP')]),trafego_pago:String(row[ix('TRAFEG')]||'').trim(),pendencia:String(row[ix('PEND')]||'').trim(),parcela:String(row[ix('PARCEL')]||'').trim(),obs:String(row[ix('OBS')]||'').trim()});}if(!imp.length){toast('Sem dados','err');return;}DB=imp;persist();buildFilters();applyFilter();renderStats();renderNewRowFixed();toast(`${imp.length} contratos importados`);}catch(err){toast('Erro ao ler arquivo','err');console.error(err);}};
  r.readAsBinaryString(f);e.target.value='';
}
function doXLSX(){const d=DB.map(c=>({'NOME':c.nome,'CPF':c.cpf,'Ação':c.acao,'Data':c.data,'Etapas':c.etapas,'Atualização':c.atualizacao,'DPP ou DN':c.dpp_dn,'Trafego Pago':c.trafego_pago,'Pendencia':c.pendencia,'Parcela':c.parcela,'OBS':c.obs}));const ws=XLSX.utils.json_to_sheet(d);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Contratos');XLSX.writeFile(wb,`Contratos_${new Date().toISOString().slice(0,10)}.xlsx`);toast('XLSX exportado');}
function doCSV(){const hs=['NOME','CPF','Ação','Data','Etapas','Atualização','DPP ou DN','Trafego Pago','Pendencia','Parcela','OBS'];const rows=DB.map(c=>[c.nome,c.cpf,c.acao,c.data,c.etapas,c.atualizacao,c.dpp_dn,c.trafego_pago,c.pendencia,c.parcela,c.obs].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));const csv=[hs.join(','),...rows].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download=`Contratos_${new Date().toISOString().slice(0,10)}.csv`;a.click();toast('CSV exportado');}

// ── TOAST ──
function toast(msg,type='ok'){const c=document.getElementById('TOASTS');const t=document.createElement('div');t.className=`toast t-${type}`;t.innerHTML=`<span class="td">${type==='ok'?'✓':'✕'}</span> ${msg}`;c.appendChild(t);setTimeout(()=>t.style.opacity='0',2600);setTimeout(()=>t.remove(),3000);}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeM();closeDet();closeCfm();closeObs();closeMOP();closeDrop();}
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.closest&&document.activeElement.closest('#NR_FIXED')){commitNewRow();}
});

// ── INIT ──
(function(){
  initSB();
  checkAuth();
  _stT=null;_stP=false;
  DB.forEach((c,i)=>{if(c._id===undefined)c._id=i;});
  NID=DB.reduce((m,c)=>Math.max(m,c._id||0),0)+1;
  populateEtapaSelect();buildHeader();buildFilters();renderNewRowFixed();
  // Sort by data ascending on first load (oldest first, newest last)
  SF='data';SD=1;buildHeader();sortRender();
  renderStats();
  // Scroll to bottom after render
  setTimeout(()=>{
    const ts=document.getElementById('TS');
    if(ts)ts.scrollTop=ts.scrollHeight;
  },120);
})();
window.addEventListener('resize',()=>{clearTimeout(window._rzt);window._rzt=setTimeout(()=>{if(document.getElementById('LOGIN_SCREEN')&&document.getElementById('LOGIN_SCREEN').classList.contains('hidden')){buildHeader();}},200);});
</script>
